# Docker Compose 
version: "3.9"

services:

  # Backend 
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mindbot-server
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CLIENT_URL=http://localhost
    volumes:
      
      - mindbot-data:/app/data
    ports:
      - "5000:5000"
    networks:
      - mindbot-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: mindbot-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - mindbot-network

# Volumes
volumes:
  mindbot-data:
    driver: local

# Network
networks:
  mindbot-network:
    driver: bridge